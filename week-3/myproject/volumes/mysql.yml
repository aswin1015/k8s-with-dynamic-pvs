apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: banking-app
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: cm9vdHBhc3N3b3Jk
  MYSQL_REPLICATION_PASSWORD: cmVwbGljYXRpb25wYXNzd29yZA==
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: banking-app
data:
  primary.cnf: |
    [mysqld]
    log-bin=mysql-bin
    binlog_format=ROW
    gtid_mode=ON
    enforce_gtid_consistency=ON
    sync_binlog=1
    innodb_flush_log_at_trx_commit=1
    skip-host-cache
    skip-name-resolve

  replica.cnf: |
    [mysqld]
    super-read-only=1
    log-bin=mysql-bin
    binlog_format=ROW
    gtid_mode=ON
    enforce_gtid_consistency=ON
    log_replica_updates=ON
    relay-log=relay-bin
    skip-host-cache
    skip-name-resolve
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-script
  namespace: banking-app
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS banking_db;
    USE banking_db;

    CREATE TABLE IF NOT EXISTS users (
        id INT AUTO_INCREMENT PRIMARY KEY,
        username VARCHAR(255) UNIQUE NOT NULL,
        password VARCHAR(255) NOT NULL,
        email VARCHAR(255) NOT NULL
    );

    CREATE TABLE IF NOT EXISTS accounts (
        id INT AUTO_INCREMENT PRIMARY KEY,
        user_id INT NOT NULL,
        account_number VARCHAR(50) UNIQUE NOT NULL,
        balance DECIMAL(15, 2) DEFAULT 0.00,
        FOREIGN KEY (user_id) REFERENCES users(id)
    );

    CREATE TABLE IF NOT EXISTS transactions (
        id INT AUTO_INCREMENT PRIMARY KEY,
        from_account_id INT,
        to_account_id INT,
        amount DECIMAL(15, 2) NOT NULL,
        status VARCHAR(50) NOT NULL,
        timestamp DATETIME DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS loans (
        id INT AUTO_INCREMENT PRIMARY KEY,
        user_id INT NOT NULL,
        amount DECIMAL(15, 2) NOT NULL,
        status VARCHAR(50) DEFAULT 'PENDING',
        FOREIGN KEY (user_id) REFERENCES users(id)
    );

    CREATE USER IF NOT EXISTS 'replicator'@'%'
      IDENTIFIED WITH mysql_native_password BY 'replicationpassword';
    GRANT REPLICATION SLAVE ON *.* TO 'replicator'@'%';
    FLUSH PRIVILEGES;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: banking-app
spec:
  serviceName: "mysql"
  replicas: 3
  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      initContainers:
      - name: init-mysql
        image: mysql:8.0
        command:
        - bash
        - "-c"
        - |
          set -ex
          [[ $HOSTNAME =~ -([0-9]+)$ ]] || exit 1
          ordinal=${BASH_REMATCH[1]}

          mkdir -p /mnt/conf.d

          printf "[mysqld]\nserver-id=%d\n" "$((100 + $ordinal))" > /mnt/conf.d/server-id.cnf

          if [[ $ordinal -eq 0 ]]; then
            cp /mnt/config-map/primary.cnf /mnt/conf.d/base.cnf
          else
            cp /mnt/config-map/replica.cnf /mnt/conf.d/base.cnf
          fi

        volumeMounts:
        - name: conf
          mountPath: /mnt/conf.d
        - name: config-map
          mountPath: /mnt/config-map

      containers:
      - name: mysql
        image: mysql:8.0

        ports:
        - name: mysql
          containerPort: 3306

        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD
        - name: MYSQL_DATABASE
          value: banking_db
        - name: MYSQL_ROOT_HOST
          value: "%"

        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        - name: conf
          mountPath: /etc/mysql/conf.d
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d

        startupProbe:
          exec:
            command: ["mysqladmin","ping","-h","127.0.0.1"]
          initialDelaySeconds: 90
          periodSeconds: 10
          failureThreshold: 40
          timeoutSeconds: 10

        readinessProbe:
          exec:
            command: ["mysqladmin","ping","-h","127.0.0.1"]
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10

        livenessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 90
          periodSeconds: 20
          timeoutSeconds: 10

      volumes:
      - name: conf
        emptyDir: {}
      - name: config-map
        configMap:
          name: mysql-config
      - name: init-script
        configMap:
          name: mysql-init-script

  volumeClaimTemplates:
  - metadata:
      name: mysql-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: nfs-client
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: banking-app
spec:
  clusterIP: None
  selector:
    app: mysql
  ports:
  - port: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-read
  namespace: banking-app
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
