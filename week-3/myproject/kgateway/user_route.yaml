apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: user-route
  namespace: banking-app
spec:
  parentRefs:
  - name: banking-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/user
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: user-service
      port: 3001
