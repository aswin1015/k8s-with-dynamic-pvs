apiVersion: apps/v1
kind: Deployment
metadata:
  name: front
  namespace: banking-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: f1
        image: thamizhanm3/bank-frontend:v1
        envFrom:
        - configMapRef:
            name: fcm
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: banking-app
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30030
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fcm
  namespace: banking-app
data:
  USER_URL: "http://user-service:3001"
  ACCOUNT_URL: "http://account-service:3002"
  TX_URL: "http://transaction-service:3003"
  LOAN_URL: "http://loan-service:3005"
  REPORT_URL: "http://reporting-service:3010"
