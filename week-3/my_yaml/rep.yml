apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: repdemo 
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginxtemp 
  template:
    metadata:
      name: mynginxpod
      labels:
        app: nginxtemp
    spec:
      containers:
      - name: nginxtemp
        image: yaswanthreddy1602/demo:v1
        ports:
        - containerPort: 80
